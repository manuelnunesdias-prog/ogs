<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Live Tournoi OGS Football</title>
    <style>
        /* Charte Graphique Officielle OGS Football */
        :root {
            --ogs-blue-sky: #009ee2;    
            --ogs-blue-dark: #0f2a4a;   
            --ogs-yellow: #fdeb00;      
            --accent-ldc: #0d1b2a;      
            --accent-europa: #e67e22;   
            --bg-body: #f4f7f6;         
            --bg-card: #ffffff;         
            --text-main: #1a202c;       
            --text-muted: #718096;      
            --danger-color: #e53e3e;
            --success-color: #38a169;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); padding-bottom: 40px; }
        
        header {
            background: linear-gradient(rgba(15, 42, 74, 0.6), rgba(15, 42, 74, 0.85)), url('banner__saebz4.jpg') center/cover no-repeat;
            color: white;
            padding: 30px 15px;
            text-align: center;
            border-bottom: 5px solid var(--ogs-yellow);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 140px;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            max-width: 600px;
            width: 100%;
        }

        .header-logo {
            width: 65px;
            height: 65px;
            object-fit: contain;
            background: white;
            padding: 4px;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 2px solid var(--ogs-yellow);
        }

        .header-text { text-align: left; }
        header h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; color: #fff; }
        header p { font-size: 0.85rem; color: var(--ogs-yellow); font-weight: 600; margin-top: 2px; }

        .admin-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--ogs-yellow);
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        .admin-toggle.is-admin {
            background: var(--ogs-yellow);
            color: var(--ogs-blue-dark);
            box-shadow: 0 0 10px rgba(253, 235, 0, 0.5);
        }

        .nav-tabs {
            display: flex;
            justify-content: space-around;
            background: var(--bg-card);
            margin: 15px 12px;
            padding: 4px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
            overflow-x: auto;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 6px;
            border: none;
            background: none;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            text-align: center;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .tab-btn:hover { color: var(--ogs-blue-sky); background: #f1f5f9; }
        .tab-btn.active { background-color: var(--ogs-blue-sky); color: white; }
        #tab-btn-config { display: none; background-color: #edf2f7; color: var(--ogs-blue-dark); }

        .tab-content { display: none; padding: 0 12px; }
        .tab-content.active { display: block; }

        .section-title {
            font-size: 0.95rem;
            margin: 25px 0 12px 0;
            color: var(--ogs-blue-dark);
            border-left: 4px solid var(--ogs-blue-sky);
            padding-left: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.8rem; font-weight: 700; color: var(--ogs-blue-dark); text-transform: uppercase; }
        .form-control { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; font-weight: 600; }

        .match-card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
            border-left: 5px solid var(--ogs-blue-sky);
        }
        .match-time {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 6px;
            gap: 10px;
        }
        .match-edit-inline { display: flex; gap: 4px; align-items: center; }
        .match-edit-inline select { font-size: 0.75rem; padding: 3px; border: 1px solid #cbd5e1; border-radius: 4px; font-weight: 600; background: #fff; }
        
        .terrain-badge { background: #f1f5f9; color: var(--ogs-blue-dark); padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; border: 1px solid #cbd5e1; }
        .match-teams { display: flex; flex-direction: column; gap: 10px; }
        .team-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; font-weight: 600; }
        .score-input { width: 48px; text-align: center; padding: 5px; border: 1px solid #cbd5e1; border-radius: 6px; font-weight: 700; font-size: 1rem; background-color: #f8fafc; }

        .poule-container { background: var(--bg-card); border-radius: 10px; padding: 12px; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        .poule-title { font-size: 0.95rem; font-weight: 800; color: var(--ogs-blue-dark); background: var(--ogs-yellow); margin: -12px -12px 10px -12px; padding: 10px 12px; border-top-left-radius: 9px; border-top-right-radius: 9px; border-bottom: 2px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 10px 6px; text-align: center; }
        th { background-color: #f8fafc; color: var(--text-muted); font-weight: 700; border-bottom: 2px solid #e2e8f0; text-transform: uppercase; font-size: 0.75rem; }
        td.team-name { text-align: left; font-weight: 600; }
        tr:not(:last-child) { border-bottom: 1px solid #f1f5f9; }
        .pts-col { font-weight: 700; color: var(--ogs-blue-sky); }

        .btn-action { padding: 4px 8px; border: none; border-radius: 4px; font-size: 0.75rem; font-weight: 700; cursor: pointer; color: white; }
        .btn-danger { background-color: var(--danger-color); }
        .btn-success { background-color: var(--success-color); padding: 8px 15px; margin-top: 10px; }

        .ldc-card { border-left: 5px solid var(--accent-ldc) !important; }
        .europa-card { border-left: 5px solid var(--accent-europa) !important; }
        .btn-validation-container { margin: 30px 0 15px 0; text-align: center; display: none; }
        .btn-validate { background: linear-gradient(to bottom, #2ecc71, #27ae60); color: white; border: none; padding: 16px 30px; font-size: 0.95rem; font-weight: 700; text-transform: uppercase; border-radius: 8px; cursor: pointer; width: 100%; border-bottom: 3px solid #219653; }
        
        .btn-save-config { background: linear-gradient(to bottom, #3498db, #2980b9); color: white; border: none; padding: 15px; font-size: 1rem; font-weight: 700; text-transform: uppercase; border-radius: 8px; cursor: pointer; width: 100%; margin: 20px 0 40px 0; border-bottom: 3px solid #2471a3; }
        .btn-save-config:hover { filter: brightness(1.05); }
    </style>
</head>
<body>

    <header>
        <button id="adminBtn" class="admin-toggle" onclick="toggleAdminMode()">🔒 Mode: Viewer</button>
        <div class="header-container">
            <img src="téléchargement.jpg" alt="Logo OGS" class="header-logo">
            <div class="header-text">
                <h1 id="header-main-title">OLYMPIQUE GRANDE-SYNTHE</h1>
                <p id="header-sub-title">🏆 Chargement en cours...</p>
            </div>
        </div>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="openTab('classement')">📊 Classements</button>
        <button class="tab-btn" onclick="openTab('poules')">Matchs Poules</button>
        <button class="tab-btn" onclick="openTab('ldc')">🏆 LDC</button>
        <button class="tab-btn" onclick="openTab('europa')">🇪🇺 Europa</button>
        <button class="tab-btn" id="tab-btn-config" onclick="openTab('config')">⚙️ Paramètres</button>
    </div>

    <div id="classement" class="tab-content active">
        <div class="section-title">Classement Général des Poules</div>
        <div id="tables-container">Aucune donnée trouvée.</div>
    </div>

    <div id="poules" class="tab-content">
        <div id="list-matchs-poules"></div>
        <div id="validationContainer" class="btn-validation-container">
            <button class="btn-validate" onclick="validerPoulesEtGenererPhasesFinales()">Valider la fin des poules</button>
        </div>
    </div>

    <div id="ldc" class="tab-content">
        <div id="list-matchs-ldc"></div>
    </div>

    <div id="europa" class="tab-content">
        <div id="list-matchs-europa"></div>
    </div>

    <div id="config" class="tab-content">
        <div class="section-title">Configuration Générale du Tournoi</div>
        <div class="config-grid">
            <div class="form-group">
                <label>Date du Tournoi</label>
                <input type="date" id="cfg-date" class="form-control">
            </div>
            <div class="form-group">
                <label>Heure Premier Match</label>
                <input type="time" id="cfg-heure-debut" class="form-control">
            </div>
            <div class="form-group">
                <label>Heure Dernier Match</label>
                <input type="time" id="cfg-heure-fin" class="form-control">
            </div>
            <div class="form-group">
                <label>Nombre de Terrains</label>
                <input type="number" id="cfg-terrains" class="form-control" min="1" max="10">
            </div>
            <div class="form-group">
                <label>Durée Mi-temps (min)</label>
                <input type="number" id="cfg-duree-mitemps" class="form-control" min="1">
            </div>
            <div class="form-group">
                <label>Durée Pause (min)</label>
                <input type="number" id="cfg-duree-pause" class="form-control" min="0">
            </div>
            <div class="form-group">
                <label>Changement Terrain (min)</label>
                <input type="number" id="cfg-duree-rot" class="form-control" min="0">
            </div>
        </div>

        <div class="section-title">Gestion des Équipes par Poule</div>
        <div id="config-teams-container"></div>
        
        <button class="btn-save-config" onclick="sauvegarderEtAppliquerConfiguration()">💾 Enregistrer les modifications sur le serveur</button>
    </div>

    <script>
        let isAdmin = false;
        const ADMIN_CODE = "5976";
        
        let configTournoi = {};
        let d_equipes = {};
        let matchsPoules = [];
        let matchsLdc = [];
        let matchsEuropa = [];
        let d_classements_finaux = {};

        // 🚀 ENVOI DIRECT ET AUTOMATIQUE AU SERVEUR VIA LE PHP
        async function enregistrerDirectementSurServeur() {
    let backup = {
        configTournoi: configTournoi,
        d_equipes: d_equipes,
        matchsPoules: matchsPoules,
        matchsLdc: matchsLdc,
        matchsEuropa: matchsEuropa
    };

    try {
        // Utilisation de './' pour forcer le même dossier exact sur l'hébergeur
        const response = await fetch('./sauvegarder.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(backup)
        });
        
        const resultat = await response.json();
        
        if (!response.ok) {
            throw new Error(resultat.message || "Erreur serveur");
        }
        
        console.log("Succès :", resultat.message);
    } catch (err) {
        console.error("Échec de la mise à jour automatique :", err);
        alert("⚠️ Erreur de sauvegarde sur le serveur : " + err.message + "\nVérifiez les droits du fichier tournoi_data.txt (CHMOD 666).");
    }
    
    // Sauvegarde locale de secours dans le navigateur
    localStorage.setItem('ogs_configTournoi', JSON.stringify(configTournoi));
    localStorage.setItem('ogs_d_equipes', JSON.stringify(d_equipes));
    localStorage.setItem('ogs_matchsPoules', JSON.stringify(matchsPoules));
    localStorage.setItem('ogs_matchsLdc', JSON.stringify(matchsLdc));
    localStorage.setItem('ogs_matchsEuropa', JSON.stringify(matchsEuropa));
}

        async function chargerDonneesGénérales() {
            try {
                const response = await fetch('tournoi_data.txt?cache=' + Date.now());
                if (!response.ok) throw new Error("Fichier inexistant");
                
                const data = await response.json();
                configTournoi = data.configTournoi;
                d_equipes = data.d_equipes;
                matchsPoules = data.matchsPoules;
                matchsLdc = data.matchsLdc;
                matchsEuropa = data.matchsEuropa;
                return true;
            } catch (error) {
                if (localStorage.getItem('ogs_configTournoi')) {
                    configTournoi = JSON.parse(localStorage.getItem('ogs_configTournoi'));
                    d_equipes = JSON.parse(localStorage.getItem('ogs_d_equipes'));
                    matchsPoules = JSON.parse(localStorage.getItem('ogs_matchsPoules'));
                    matchsLdc = JSON.parse(localStorage.getItem('ogs_matchsLdc'));
                    matchsEuropa = JSON.parse(localStorage.getItem('ogs_matchsEuropa'));
                    return true;
                }
                return false;
            }
        }

        function rafraichirChampsFormulaire() {
            if(!configTournoi.date) return;
            document.getElementById('cfg-date').value = configTournoi.date;
            document.getElementById('cfg-heure-debut').value = configTournoi.heureDebut;
            document.getElementById('cfg-heure-fin').value = configTournoi.heureFin;
            document.getElementById('cfg-terrains').value = configTournoi.nbTerrains;
            document.getElementById('cfg-duree-mitemps').value = configTournoi.dureeMitemps;
            document.getElementById('cfg-duree-pause').value = configTournoi.dureePause;
            document.getElementById('cfg-duree-rot').value = configTournoi.dureeRot;

            let options = { day: 'numeric', month: 'long' };
            let dateFormatee = new Date(configTournoi.date).toLocaleDateString('fr-FR', options);
            document.getElementById('header-sub-title').innerText = `🏆 Tournoi Officiel du ${dateFormatee} • Live Poules & Finales`;
        }

        function ajouterMinutesAHeure(heureStr, minutesAAjouter) {
            let [h, m] = heureStr.split(':').map(Number);
            let totalMinutes = h * 60 + m + minutesAAjouter;
            let nouvellesHeures = Math.floor(totalMinutes / 60) % 24;
            let nouvellesMinutes = totalMinutes % 60;
            nouvellesMinutes = Math.round(nouvellesMinutes / 15) * 15;
            if(nouvellesMinutes === 60) {
                nouvellesMinutes = 0;
                nouvellesHeures = (nouvellesHeures + 1) % 24;
            }
            return `${nouvellesHeures.toString().padStart(2, '0')}:${nouvellesMinutes.toString().padStart(2, '0')}`;
        }

        function verifierDoublonsMatchs() {
            let occupation = {};
            let aUnDoublon = false;

            for (let m of matchsPoules) {
                let cle = `${m.heure}-T${m.terrain}`;
                if (occupation[cle]) { aUnDoublon = true; break; }
                occupation[cle] = true;
            }
            for (let m of matchsLdc) {
                if(m.team1 || m.team2) {
                    let cle = `${m.heure}-T${m.terrain}`;
                    if (occupation[cle]) { aUnDoublon = true; break; }
                    occupation[cle] = true;
                }
            }
            for (let m of matchsEuropa) {
                if(m.team1 || m.team2) {
                    let cle = `${m.heure}-T${m.terrain}`;
                    if (occupation[cle]) { aUnDoublon = true; break; }
                    occupation[cle] = true;
                }
            }
            return aUnDoublon;
        }

        function initMatchsPoules() {
            matchsPoules = [];
            const oppositions = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];
            let dureeTotaleMatch = (configTournoi.dureeMitemps * 2) + configTournoi.dureePause + configTournoi.dureeRot;
            let heureActuelleRotation = configTournoi.heureDebut;
            
            const rotationsDef = [
                { num: 1, poules: ['A', 'B'] },
                { num: 2, poules: ['C', 'D'] },
                { num: 3, poules: ['A', 'B'] },
                { num: 4, poules: ['C', 'D'] },
                { num: 5, poules: ['A', 'B'] },
                { num: 6, poules: ['C', 'D'] }
            ];

            rotationsDef.forEach((rot) => {
                let currentTerrain = 1;
                rot.poules.forEach(poule => {
                    let oppIndex = (rot.num === 1 || rot.num === 2) ? 0 : ((rot.num === 3 || rot.num === 4) ? 2 : 4);
                    
                    for(let i=0; i<2; i++) {
                        let idx = oppIndex + i;
                        let eq1 = d_equipes[poule][oppositions[idx]?.[0]] || "Vide";
                        let eq2 = d_equipes[poule][oppositions[idx]?.[1]] || "Vide";
                        
                        matchsPoules.push({
                            id: `P-${rot.num}-${poule}-${i}`,
                            rotation: rot.num,
                            heure: heureActuelleRotation,
                            poule: poule,
                            terrain: currentTerrain <= configTournoi.nbTerrains ? currentTerrain : 1,
                            team1: eq1,
                            team2: eq2,
                            score1: "",
                            score2: ""
                        });
                        currentTerrain++;
                    }
                });
                heureActuelleRotation = ajouterMinutesAHeure(heureActuelleRotation, dureeTotaleMatch);
            });
        }

        function initPhasesFinalesVides() {
            let dureeTotaleMatch = (configTournoi.dureeMitemps * 2) + configTournoi.dureePause + configTournoi.dureeRot;
            let heureFinPoules = configTournoi.heureDebut;
            for(let r=0; r<6; r++) { heureFinPoules = ajouterMinutesAHeure(heureFinPoules, dureeTotaleMatch); }

            let heureQuarts = heureFinPoules;
            let heureDemis = ajouterMinutesAHeure(heureQuarts, dureeTotaleMatch);
            let heureFinales = ajouterMinutesAHeure(heureDemis, dureeTotaleMatch);

            matchsLdc = [
                { id: 'LDC-Q1', tour: 'Quart 1', heure: heureQuarts, terrain: 1, t1Label: '1er Poule A', t2Label: '2ème Poule B', team1: '', team2: '', score1: '', score2: '' },
                { id: 'LDC-Q2', tour: 'Quart 2', heure: heureQuarts, terrain: 2, t1Label: '1er Poule B', t2Label: '2ème Poule A', team1: '', team2: '', score1: '', score2: '' },
                { id: 'LDC-Q3', tour: 'Quart 3', heure: ajouterMinutesAHeure(heureQuarts, 15), terrain: 1, t1Label: '1er Poule C', t2Label: '2ème Poule D', team1: '', team2: '', score1: '', score2: '' },
                { id: 'LDC-Q4', tour: 'Quart 4', heure: ajouterMinutesAHeure(heureQuarts, 15), terrain: 2, t1Label: '1er Poule D', t2Label: '2ème Poule C', team1: '', team2: '', score1: '', score2: '' },
                { id: 'LDC-D1', tour: 'Demi 1', heure: heureDemis, terrain: 1, t1Label: 'Vainqueur Quart 1', t2Label: 'Vainqueur Quart 3', team1: '', team2: '', score1: '', score2: '' },
                { id: 'LDC-D2', tour: 'Demi 2', heure: heureDemis, terrain: 2, t1Label: 'Vainqueur Quart 2', t2Label: 'Vainqueur Quart 4', team1: '', team2: '', score1: '', score2: '' },
                { id: 'LDC-F', tour: 'FINALE 🏆', heure: heureFinales, terrain: 1, t1Label: 'Finaliste 1', t2Label: 'Finaliste 2', team1: '', team2: '', score1: '', score2: '', isFinale: true }
            ];

            matchsEuropa = [
                { id: 'EUR-Q1', tour: 'Quart 1', heure: heureQuarts, terrain: 3, t1Label: '3ème Poule A', t2Label: '4ème Poule B', team1: '', team2: '', score1: '', score2: '' },
                { id: 'EUR-Q2', tour: 'Quart 2', heure: heureQuarts, terrain: 4, t1Label: '3ème Poule B', t2Label: '4ème Poule A', team1: '', team2: '', score1: '', score2: '' },
                { id: 'EUR-Q3', tour: 'Quart 3', heure: ajouterMinutesAHeure(heureQuarts, 15), terrain: 3, t1Label: '3ème Poule C', t2Label: '4ème Poule D', team1: '', team2: '', score1: '', score2: '' },
                { id: 'EUR-Q4', tour: 'Quart 4', heure: ajouterMinutesAHeure(heureQuarts, 15), terrain: 4, t1Label: '3ème Poule D', t2Label: '4ème Poule C', team1: '', team2: '', score1: '', score2: '' },
                { id: 'EUR-D1', tour: 'Demi 1', heure: heureDemis, terrain: 3, t1Label: 'Vainqueur Quart 1', t2Label: 'Vainqueur Quart 3', team1: '', team2: '', score1: '', score2: '' },
                { id: 'EUR-D2', tour: 'Demi 2', heure: heureDemis, terrain: 4, t1Label: 'Vainqueur Quart 2', t2Label: 'Vainqueur Quart 4', team1: '', team2: '', score1: '', score2: '' },
                { id: 'EUR-F', tour: 'FINALE 🇪🇺', heure: heureFinales, terrain: 2, t1Label: 'Finaliste 1', t2Label: 'Finaliste 2', team1: '', team2: '', score1: '', score2: '', isFinale: true }
            ];
        }

        function toggleAdminMode() {
            if (!isAdmin) {
                let code = prompt("Entrez le code d'accès Admin :");
                if (code === ADMIN_CODE) {
                    isAdmin = true;
                    document.getElementById('adminBtn').innerText = "🔓 Mode: Admin";
                    document.getElementById('adminBtn').classList.add('is-admin');
                    document.getElementById('validationContainer').style.display = 'block';
                    document.getElementById('tab-btn-config').style.display = 'block';
                    renderAll();
                } else { alert("Code incorrect !"); }
            } else {
                isAdmin = false;
                document.getElementById('adminBtn').innerText = "🔒 Mode: Viewer";
                document.getElementById('adminBtn').classList.remove('is-admin');
                document.getElementById('validationContainer').style.display = 'none';
                document.getElementById('tab-btn-config').style.display = 'none';
                if(document.getElementById('config').classList.contains('active')) openTab('classement');
                renderAll();
            }
        }

        function openTab(tabName) {
            var x = document.getElementsByClassName("tab-content");
            var tabs = document.getElementsByClassName("tab-btn");
            for (var i = 0; i < x.length; i++) {
                x[i].style.display = "none";  
                tabs[i].classList.remove("active");
            }
            document.getElementById(tabName).style.display = "block";  
            event.currentTarget.classList.add("active");
        }

        function sauvegarderEtAppliquerConfiguration() {
            configTournoi.date = document.getElementById('cfg-date').value;
            configTournoi.heureDebut = document.getElementById('cfg-heure-debut').value;
            configTournoi.heureFin = document.getElementById('cfg-heure-fin').value;
            configTournoi.nbTerrains = parseInt(document.getElementById('cfg-terrains').value) || 1;
            configTournoi.dureeMitemps = parseInt(document.getElementById('cfg-duree-mitemps').value) || 0;
            configTournoi.dureePause = parseInt(document.getElementById('cfg-duree-pause').value) || 0;
            configTournoi.dureeRot = parseInt(document.getElementById('cfg-duree-rot').value) || 0;

            initMatchsPoules();
            initPhasesFinalesVides();

            if (verifierDoublonsMatchs()) {
                alert("⚠️ Erreur : Conflit d'horaire ou de terrain détecté.");
                return;
            }

            rafraichirChampsFormulaire();
            calculerTournoi();
            enregistrerDirectementSurServeur(); 
            renderAll();
            alert("✅ Enregistré ! Fichier serveur mis à jour automatiquement pour tous les viewers.");
        }

        function updateMatchField(matchId, field, value, typeList) {
            let list = typeList === 'poules' ? matchsPoules : (typeList === 'ldc' ? matchsLdc : matchsEuropa);
            let m = list.find(match => match.id === matchId);
            if(m) {
                m[field] = value;
                calculerTournoi();
                enregistrerDirectementSurServeur();
            }
        }

        function updateMatchTimeSelector(matchId, part, value, typeList) {
            let list = typeList === 'poules' ? matchsPoules : (typeList === 'ldc' ? matchsLdc : matchsEuropa);
            let m = list.find(match => match.id === matchId);
            if(m) {
                let currentParts = m.heure.split(':');
                let h = currentParts[0] || "09";
                let min = currentParts[1] || "00";
                if(part === 'h') h = value;
                if(part === 'm') min = value;
                
                let ancienneHeure = m.heure;
                m.heure = `${h}:${min}`;

                if(verifierDoublonsMatchs()) {
                    alert("⚠️ Conflit d'horaire !");
                    m.heure = ancienneHeure;
                } else {
                    enregistrerDirectementSurServeur();
                }
                renderAll();
            }
        }

        function modifierNomEquipe(poule, index, nouveauNom) {
            let ancienNom = d_equipes[poule][index];
            d_equipes[poule][index] = nouveauNom;
            matchsPoules.forEach(m => {
                if(m.poule === poule) {
                    if(m.team1 === ancienNom) m.team1 = nouveauNom;
                    if(m.team2 === ancienNom) m.team2 = nouveauNom;
                }
            });
            enregistrerDirectementSurServeur();
        }

        function ajouterEquipe(poule) {
            let num = d_equipes[poule].length + 1;
            d_equipes[poule].push(`Nouvelle Équipe ${num}`);
            enregistrerDirectementSurServeur();
            renderConfigEquipes();
        }

        function supprimerEquipe(poule, index) {
            d_equipes[poule].splice(index, 1);
            enregistrerDirectementSurServeur();
            renderConfigEquipes();
        }

        function renderTimeSelects(matchId, currentValue, typeList) {
            let parts = currentValue.split(':');
            let currentH = parts[0] || "09";
            let currentM = parts[1] || "00";

            let htmlH = `<select onchange="updateMatchTimeSelector('${matchId}', 'h', this.value, '${typeList}')">`;
            for(let i=0; i<24; i++) {
                let hStr = i.toString().padStart(2, '0');
                htmlH += `<option value="${hStr}" ${currentH === hStr ? 'selected' : ''}>${hStr}h</option>`;
            }
            htmlH += `</select>`;

            let htmlM = `<select onchange="updateMatchTimeSelector('${matchId}', 'm', this.value, '${typeList}')">`;
            ['00', '15', '30', '45'].forEach(min => {
                htmlM += `<option value="${min}" ${currentM === min ? 'selected' : ''}>${min}</option>`;
            });
            htmlM += `</select>`;
            return htmlH + ":" + htmlM;
        }

        function renderTerrainSelectOptions(selected) {
            let options = "";
            for(let i=1; i<=configTournoi.nbTerrains; i++) {
                options += `<option value="${i}" ${selected == i ? 'selected' : ''}>T. ${i}</option>`;
            }
            return options;
        }

        function renderMatchList(list, targetId, typeList) {
            let html = "";
            let currentRot = 0;

            list.forEach(m => {
                if(typeList === 'poules' && currentRot !== m.rotation) {
                    currentRot = m.rotation;
                    html += `<div class="section-title">Rotation ${currentRot} — Poules ${currentRot % 2 === 0 ? 'C & D':'A & B'}</div>`;
                } else if(typeList !== 'poules' && currentRot === 0) {
                    currentRot = 1;
                    html += `<div class="section-title">Tableau des Phases Finales</div>`;
                }

                let infoTerrain = isAdmin ? 
                    `<div class="match-edit-inline">⏱️ ${renderTimeSelects(m.id, m.heure, typeList)} <select onchange="updateMatchField('${m.id}', 'terrain', this.value, '${typeList}')">${renderTerrainSelectOptions(m.terrain)}</select></div>` :
                    `<span>${m.heure}</span> <span class="terrain-badge">Terrain ${m.terrain}</span>`;

                html += `
                <div class="match-card ${m.isFinale ? '' : (typeList==='ldc'?'ldc-card':'europa-card')}">
                    <div class="match-time">
                        <span>${m.poule ? 'Poule ' + m.poule : m.tour}</span>
                        ${infoTerrain}
                    </div>
                    <div class="match-teams">
                        <div class="team-row">
                            <span>${m.team1 || m.t1Label}</span> 
                            <input type="number" class="score-input" value="${m.score1}" ${isAdmin?'':'disabled'} onchange="updateMatchField('${m.id}', 'score1', this.value, '${typeList}')">
                        </div>
                        <div class="team-row">
                            <span>${m.team2 || m.t2Label}</span> 
                            <input type="number" class="score-input" value="${m.score2}" ${isAdmin?'':'disabled'} onchange="updateMatchField('${m.id}', 'score2', this.value, '${typeList}')">
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById(targetId).innerHTML = html;
        }

        function renderConfigEquipes() {
            let html = "";
            for(let poule in d_equipes) {
                html += `
                <div class="poule-container">
                    <div class="poule-title">Gestion Poule ${poule}</div>
                    <table>
                        <thead>
                            <tr>
                                <th style="text-align:left; width:70%;">Nom de l'équipe</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>`;
                d_equipes[poule].forEach((team, index) => {
                    html += `
                    <tr>
                        <td style="text-align:left;">
                            <input type="text" class="form-control" style="width:100%;" value="${team}" onchange="modifierNomEquipe('${poule}', ${index}, this.value)">
                        </td>
                        <td>
                            <button class="btn-action btn-danger" onclick="supprimerEquipe('${poule}', ${index})">Supprimer</button>
                        </td>
                    </tr>`;
                });
                html += `</tbody></table><button class="btn-action btn-success" onclick="ajouterEquipe('${poule}')">+ Ajouter une Équipe</button></div>`;
            }
            document.getElementById('config-teams-container').innerHTML = html;
        }

        function calculerTournoi() {
            if(!d_equipes['A']) return;
            let stats = {};
            for (let poule in d_equipes) {
                d_equipes[poule].forEach(team => {
                    stats[team] = { poule: poule, pts: 0, bm: 0, be: 0, diff: 0 };
                });
            }

            matchsPoules.forEach(m => {
                if (m.score1 !== "" && m.score2 !== "" && stats[m.team1] && stats[m.team2]) {
                    let s1 = parseInt(m.score1) || 0;
                    let s2 = parseInt(m.score2) || 0;
                    stats[m.team1].bm += s1; stats[m.team1].be += s2;
                    stats[m.team2].bm += s2; stats[m.team2].be += s1;
                    if (s1 > s2) { stats[m.team1].pts += 3; }
                    else if (s1 < s2) { stats[m.team2].pts += 3; }
                    else { stats[m.team1].pts += 1; stats[m.team2].pts += 1; }
                }
            });

            for (let team in stats) { stats[team].diff = stats[team].bm - stats[team].be; }

            let html = "";
            for (let poule in d_equipes) {
                let equipesTriees = d_equipes[poule].map(t => ({name: t, ...stats[t]})).filter(e => e.name !== "Vide");
                equipesTriees.sort((a, b) => b.pts - a.pts || b.diff - a.diff || b.bm - a.bm);
                d_classements_finaux[poule] = equipesTriees;

                html += `
                <div class="poule-container">
                    <div class="poule-title">POULE ${poule}</div>
                    <table>
                        <thead>
                            <tr>
                                <th class="team-name">Équipe</th>
                                <th class="pts-col">Pts</th>
                                <th>BP</th>
                                <th>BC</th>
                                <th>Diff.</th>
                            </tr>
                        </thead>
                        <tbody>`;
                equipesTriees.forEach((eq, index) => {
                    let diffAffichage = eq.diff > 0 ? `+${eq.diff}` : eq.diff;
                    html += `
                            <tr>
                                <td class="team-name">${index + 1}. ${eq.name}</td>
                                <td class="pts-col">${eq.pts}</td>
                                <td>${eq.bm}</td>
                                <td>${eq.be}</td>
                                <td style="font-weight: 700; color: ${eq.diff > 0 ? '#27ae60' : (eq.diff < 0 ? '#e53e3e' : 'inherit')}">${diffAffichage}</td>
                            </tr>`;
                });
                html += `</tbody></table></div>`;
            }
            document.getElementById('tables-container').innerHTML = html;
        }

        function validerPoulesEtGenererPhasesFinales() {
            if (confirm("Confirmer la validation des poules ?")) {
                calculerTournoi();
                matchsLdc[0].team1 = d_classements_finaux['A'][0]?.name || '1er A';
                matchsLdc[0].team2 = d_classements_finaux['B'][1]?.name || '2ème B';
                matchsLdc[1].team1 = d_classements_finaux['B'][0]?.name || '1er B';
                matchsLdc[1].team2 = d_classements_finaux['A'][1]?.name || '2ème A';
                matchsLdc[2].team1 = d_classements_finaux['C'][0]?.name || '1er C';
                matchsLdc[2].team2 = d_classements_finaux['D'][1]?.name || '2ème D';
                matchsLdc[3].team1 = d_classements_finaux['D'][0]?.name || '1er D';
                matchsLdc[3].team2 = d_classements_finaux['C'][1]?.name || '2ème C';

                matchsEuropa[0].team1 = d_classements_finaux['A'][2]?.name || '3ème A';
                matchsEuropa[0].team2 = d_classements_finaux['B'][3]?.name || '4ème B';
                matchsEuropa[1].team1 = d_classements_finaux['B'][2]?.name || '3ème B';
                matchsEuropa[1].team2 = d_classements_finaux['A'][3]?.name || '4ème A';
                matchsEuropa[2].team1 = d_classements_finaux['C'][2]?.name || '3ème C';
                matchsEuropa[2].team2 = d_classements_finaux['D'][3]?.name || '4ème D';
                matchsEuropa[3].team1 = d_classements_finaux['D'][2]?.name || '3ème D';
                matchsEuropa[3].team2 = d_classements_finaux['C'][3]?.name || '4ème C';

                enregistrerDirectementSurServeur();
                renderAll();
                alert("Tableaux mis à jour !");
                openTab('ldc');
            }
        }

        function renderAll() {
            renderMatchList(matchsPoules, 'list-matchs-poules', 'poules');
            renderMatchList(matchsLdc, 'list-matchs-ldc', 'ldc');
            renderMatchList(matchsEuropa, 'list-matchs-europa', 'europa');
            renderConfigEquipes();
        }

        window.onload = async function() {
            let charge = await chargerDonneesGénérales();
            if (!charge) {
                configTournoi = { date: "2026-05-23", heureDebut: "09:00", heureFin: "19:00", nbTerrains: 4, dureeMitemps: 15, dureePause: 5, dureeRot: 10 };
                d_equipes = { 'A': ['Équipe 1'], 'B': ['Équipe 2'], 'C': ['Équipe 3'], 'D': ['Équipe 4'] };
                initMatchsPoules();
                initPhasesFinalesVides();
            }
            rafraichirChampsFormulaire();
            calculerTournoi();
            renderAll();
        };
    </script>
</body>
</html>
